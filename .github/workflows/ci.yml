# CI — PR Validation
#
# Runs on every pull request targeting `main`.
# Steps: lint → Jest unit tests.
#
# Salesforce deploy validation is done at package version creation time
# (sf package version create) — not in CI.

name: CI — Validate

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Jest unit tests
        run: npm run test:unit
